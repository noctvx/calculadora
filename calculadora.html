<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculadora Moderna</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <section class="calculator" aria-label="Calculadora moderna">
    <div class="calculator-header">
      <div class="brand">
        <div class="brand-dot"></div>
        <div class="brand-text">
          <strong>Calculadora+</strong>
          <span>Design inspirado em calculadoraonline.com</span>
        </div>
      </div>
    </div>

    <div class="screen">
      <div class="expression" id="expression" aria-live="polite"></div>
      <div class="result" id="result" aria-live="polite">0</div>
    </div>

    <div class="buttons">
      <button class="btn function" data-action="clear">AC</button>
      <button class="btn function" data-action="toggle-sign">±</button>
      <button class="btn function" data-action="percent">%</button>
      <button class="btn operator" data-action="operator">÷</button>

      <button class="btn" data-action="digit">7</button>
      <button class="btn" data-action="digit">8</button>
      <button class="btn" data-action="digit">9</button>
      <button class="btn operator" data-action="operator">×</button>

      <button class="btn" data-action="digit">4</button>
      <button class="btn" data-action="digit">5</button>
      <button class="btn" data-action="digit">6</button>
      <button class="btn operator" data-action="operator">−</button>

      <button class="btn" data-action="digit">1</button>
      <button class="btn" data-action="digit">2</button>
      <button class="btn" data-action="digit">3</button>
      <button class="btn operator" data-action="operator">+</button>

      <button class="btn zero" data-action="digit">0</button>
      <button class="btn" data-action="decimal">.</button>
      <button class="btn equal" data-action="equal">=</button>
    </div>
  </section>

  <script src="script.js"></script>
</body>
</html>
